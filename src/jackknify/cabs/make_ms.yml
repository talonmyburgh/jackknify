cabs:
  make_ms:
    flavour: python
    command: jackknify.core.make_test_ms.make_ms
    name: make_ms
    info:
      Creates a simple mock MS filled with 1s for testing.
    image: ghcr.io/talonmyburgh/jackknify:finalbugfixes
    inputs:
      ms-file:
        info:
          Path to create the mock MS.
        required: true
        policies:
          positional: true
      rows:
        dtype: int
        default: 100
      chans:
        dtype: int
        default: 16
    outputs:
      out_ms:
        dtype: MS
        info:
          The resulting mock Measurement Set.
        implicit: '{ms-file}'  # This links the output path to the ms-file input!
